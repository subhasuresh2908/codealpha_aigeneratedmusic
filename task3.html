<!DOCTYPE html>
<html>
<head>
<title>AI Music Generator</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#ff758c;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff4e6a;
}

audio{
    margin-top:20px;
    width:100%;
}
</style>
</head>

<body>

<div class="container">
<h2>🎵 AI Music Generator</h2>

<button onclick="generateMusic()">Generate New Music</button>

<p id="status"></p>

<audio id="player" controls></audio>
<br>
<a id="download" download>Download Music</a>

</div>

<script>
async function generateMusic(){

document.getElementById("status").innerText="Generating music... please wait";

let res=await fetch("/generate");
let data=await res.json();

document.getElementById("status").innerText="Music Ready!";

let audioURL=data.file+"?t="+new Date().getTime();
document.getElementById("player").src=audioURL;
document.getElementById("download").href=audioURL;
document.getElementById("download").innerText="Download Generated Music";
}
</script>

</body>
</html>
